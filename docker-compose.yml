services:
  postgres:
    image: postgres:16
    container_name: furniture_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-furniture}
      POSTGRES_USER: ${POSTGRES_USER:-furniture}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # init-скрипт создаёт тестовую БД при первой инициализации тома
      - ./docker/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-furniture}"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
