# Домен — единственное место где нужно менять имя сервера.
# Заменить cnc.factorymanagement.uz на свой домен если нужно.

# ── HTTP: только ACME-challenge от certbot, остальное → HTTPS ────────────────
server {
    listen 80;
    server_name cnc.factorymanagement.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: статика + API proxy ────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name cnc.factorymanagement.uz;

    ssl_certificate     /etc/letsencrypt/live/cnc.factorymanagement.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cnc.factorymanagement.uz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Для загрузки файлов заказов (лимит чуть выше MAX_FILE_SIZE = 50 MB)
    client_max_body_size 60m;

    proxy_connect_timeout 10s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;

    # ── SPA (Vue Mini App) ───────────────────────────────────────────────────
    root  /opt/cnc_mebel_bot/frontend/dist;
    index index.html;

    location ~* \.(js|css|woff2?|png|jpg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── FastAPI (REST + download endpoint) ───────────────────────────────────
    location ~ ^/(api|dl)(/|$) {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
    }
}
